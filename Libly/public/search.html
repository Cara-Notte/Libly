<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - Libly</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">Libly</a>
            <div class="nav-center">
                <div class="search-container">
                    <select id="searchAttribute" class="search-attribute">
                        <option value="">All</option>
                        <option value="title">Title</option>
                        <option value="author">Author</option>
                        <option value="genre">Genre</option>
                    </select>
                    <input type="text" id="searchInput" class="search-input" placeholder="Search books...">
                    <button id="searchBtn" class="btn btn-secondary">🔍</button>
                </div>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-item">Home</a>
                <a href="about.html" class="nav-item">About</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <h1>Search Results</h1>
        <div id="resultsContainer" class="results-container">
            <p>Enter a search query above.</p>
        </div>
    </div>
    <script src="navigation.js"></script>
    <script src="search.js"></script>
</body>
</html>
